name: Build PollyMC-Continued

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja

jobs:
  build-windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-qt6-networkauth
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-extra-cmake-modules
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-cmark
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-nghttp2
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-libb2
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-nsis

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_SYSTEM_LIBRARY_PATH=/mingw64/bin \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j2

      - name: Deploy Qt
        run: |
          cd build
          /mingw64/bin/windeployqt6.exe --release pollymc.exe

          # Resolve all DLL dependencies for every PE file in build/
          # This catches compiler runtime DLLs (libgcc_s_seh-1, libstdc++-6, libwinpthread-1, etc.)
          # and any other transitive dependencies that windeployqt6 might miss.
          NEED_FIX=0
          for f in *.exe *.dll; do
            [ -f "$f" ] || continue
            for dll in $(objdump -p "$f" 2>/dev/null | grep "DLL Name:" | awk '{print $3}'); do
              if [ -f "/mingw64/bin/$dll" ] && [ ! -f "$dll" ]; then
                cp -f "/mingw64/bin/$dll" .
                echo "Deployed missing dependency: $dll (needed by $f)"
                NEED_FIX=1
              fi
            done
          done

          # List all DLLs to verify
          echo "=== DLLs in build/ directory ==="
          ls -la *.dll

          # Recursively verify ALL dependencies for every PE file (EXEs + DLLs)
          # This catches transitive dependencies that windeployqt6 may have missed
          # and makes the CI fail early when dependency drift occurs.
          # Skip well-known Windows OS DLLs and API sets that are always present.
          SYSTEM_DLLS="^(KERNEL32|KERNELBASE|USER32|GDI32|gdi32full|ADVAPI32|SHELL32|ole32|OLEAUT32|msvcrt|ntdll|WS2_32|SHLWAPI|WINMM|VERSION|d3d11|d3d12|dxgi|dwmapi|DWrite|UxTheme|USP10|USERENV|RPCRT4|CRYPT32|bcrypt|Secur32|WINHTTP|DNSAPI|IPHLPAPI|MPR|NETAPI32|AUTHZ)\.(dll|DLL)$"
          NEED_FIX=0
          for f in *.exe *.dll; do
            [ -f "$f" ] || continue
            for dll in $(objdump -p "$f" 2>/dev/null | grep "DLL Name:" | awk '{print $3}'); do
              # Skip Windows system DLLs and API sets (api-ms-win-*, ext-ms-win-*)
              if echo "$dll" | grep -qE "$SYSTEM_DLLS"; then continue; fi
              if echo "$dll" | grep -qiE "^(api-ms-win-|ext-ms-win-)"; then continue; fi
              if [ ! -f "$dll" ] && [ ! -f "/mingw64/bin/$dll" ]; then
                echo "::error file=$f::$f is missing dependency: $dll"
                NEED_FIX=1
              fi
            done
          done
          [ "$NEED_FIX" -eq 0 ] || exit 1

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build NSIS installer
        run: |
          set -e  # Fail fast
          BUILD_DIR_WIN="$(cygpath -w "$(pwd)/build")"
          VERSION="${{ steps.version.outputs.version }}"

          echo "=== Build directory: $BUILD_DIR_WIN ==="
          echo "=== Version: $VERSION ==="
          echo "=== Current directory: $(pwd) ==="

          # Modify NSIS script with version - OUTPUT TO WORKSPACE (not /tmp/)
          sed "s/PollyMC-Continued-9\.0\.0-Setup/PollyMC-Continued-${VERSION}-Setup/" \
            pollymc_installer.nsi > pollymc_installer_versioned.nsi

          echo "=== Running makensis ==="
          which makensis || echo "WARNING: makensis not found in PATH"

          # Run makensis from workspace dir - output will be in workspace
          makensis \
            "/DBUILD_DIR=${BUILD_DIR_WIN}" \
            "pollymc_installer_versioned.nsi"

          # Verify installer was created in workspace
          echo "=== Checking for installer ==="
          ls -la *.exe || (echo "ERROR: Installer not found!" && exit 1)

      - name: Test installed binary for missing DLLs
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "PollyMC-Continued-*-Setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "No installer found at $env:GITHUB_WORKSPACE" }

          $installDir = Join-Path $env:RUNNER_TEMP "PollyMC-Test"
          Write-Host "Silently installing $($installer.Name) to $installDir ..."
          $proc = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait -PassThru -NoNewWindow
          Write-Host "Installer exit code: $($proc.ExitCode) (non-zero is normal if registry write fails)"

          $exePath = Join-Path $installDir "pollymc.exe"
          if (-not (Test-Path $exePath)) {
            $exePath = Join-Path $installDir "PollyMC-Continued" "pollymc.exe"
          }
          if (-not (Test-Path $exePath)) { throw "pollymc.exe not found after installation" }

          Write-Host "Running pollymc.exe to detect missing DLLs ..."
          $process = Start-Process -FilePath $exePath -PassThru -RedirectStandardError "$env:RUNNER_TEMP\pollymc_stderr.txt"
          $exited = $process.WaitForExit(10000)

          if (-not $exited) {
            # Process still running after 10s — kill it, check event log for errors
            $process.Kill()
            $process.WaitForExit()
            $events = Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddMinutes(-2)} -MaxEvents 10 -ErrorAction SilentlyContinue
            $hasError = $false
            foreach ($event in $events) {
              if ($event.Message -match "pollymc") {
                Write-Host "::error::Application Error detected — check event details below"
                Write-Host "Event: $($event.TimeCreated) — $($event.Message)"
                if ($event.Message -match "([a-zA-Z0-9_\-]+\.dll)") {
                  Write-Host "::error::Missing or faulty module: $($matches[1])"
                }
                $hasError = $true
              }
            }
            if (-not $hasError) {
              Write-Host "pollymc.exe started and ran for 10s — no DLL errors detected"
            } else {
              throw "Missing DLLs detected in pollymc.exe"
            }
          } elseif ($process.ExitCode -eq -1073741515) {
            Write-Host "::error::STATUS_DLL_NOT_FOUND (0xC0000135) — a required DLL is missing"
            $events = Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddMinutes(-2)} -MaxEvents 10 -ErrorAction SilentlyContinue
            foreach ($event in $events) {
              if ($event.Message -match "pollymc|$([regex]::Escape($exePath))") {
                Write-Host $event.Message
                if ($event.Message -match "(?i)([a-zA-Z0-9_\-]+\.dll)") {
                  Write-Host "::error::Missing DLL: $($matches[1])"
                }
              }
            }
            throw "pollymc.exe failed — missing DLL (STATUS_DLL_NOT_FOUND)"
          } elseif ($process.ExitCode -ne 0) {
            throw "pollymc.exe exited with code $($process.ExitCode)"
          } else {
            Write-Host "pollymc.exe started and exited cleanly (exit code 0)"
          }

          if (Test-Path "$env:RUNNER_TEMP\pollymc_stderr.txt") {
            $stderr = Get-Content "$env:RUNNER_TEMP\pollymc_stderr.txt"
            if ($stderr) { Write-Host "=== stderr ===`n$stderr" }
          }

      - name: Zip portable build
        shell: bash
        run: |
          set -e  # Fail fast
          VERSION="${{ steps.version.outputs.version }}"
          echo "=== Creating portable zip ==="
          cd build
          ls -la pollymc.exe || (echo "ERROR: pollymc.exe not found in build!" && exit 1)
          "/c/Program Files/7-Zip/7z.exe" a "../PollyMC-Continued-${VERSION}-Windows-portable.zip" .
          cd ..
          # Verify zip was created
          echo "=== Checking for zip ==="
          ls -la PollyMC-Continued-*-Windows-portable.zip || (echo "ERROR: Zip not found!" && exit 1)

      - name: Verify release files exist
        shell: bash
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Listing all files ==="
          ls -la PollyMC-Continued-* 2>/dev/null || echo "No PollyMC files found!"
          echo "=== Checking for installer ==="
          ls -la *.exe 2>/dev/null || echo "No .exe files found!"
          echo "=== Checking for zip ==="
          ls -la *.zip 2>/dev/null || echo "No .zip files found!"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Windows
          path: |
            PollyMC-Continued-*-Setup.exe
            PollyMC-Continued-*-Windows-portable.zip

      - name: Verify files before release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          echo "=== All files in workspace ==="
          ls -la
          echo "=== Checking for installer ==="
          find . -name "PollyMC-Continued-*-Setup.exe" -type f 2>/dev/null || echo "Installer not found!"
          echo "=== Checking for zip ==="
          find . -name "PollyMC-Continued-*-Windows-portable.zip" -type f 2>/dev/null || echo "Zip not found!"

      - name: Publish to release (create with changelog)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PollyMC-Continued-*-Setup.exe
            PollyMC-Continued-*-Windows-portable.zip
          generate_release_notes: true

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-svg-dev qt6-5compat-dev qt6-networkauth-dev \
            qt6-websockets-dev \
            qt6-base-dev-tools libgl-dev \
            extra-cmake-modules \
            libtomlplusplus-dev libcmark-dev libqrencode-dev \
            cmark \
            libquazip1-qt6-dev libarchive-dev zlib1g-dev \
            libcurl4-openssl-dev libssl-dev libpng-dev \
            liblz4-dev liblzma-dev libbz2-dev libzstd-dev \
            gamemode-dev \
            openjdk-21-jdk

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          cmake --install build --prefix /tmp/pollymc
          mkdir -p appdir/usr/bin appdir/usr/lib appdir/usr/share/{applications,icons/hicolor/256x256/apps}
          cp /tmp/pollymc/bin/pollymc appdir/usr/bin/
          cp /tmp/pollymc/bin/pollymc_filelink appdir/usr/bin/ 2>/dev/null || true
          cp -r /tmp/pollymc/share/* appdir/usr/share/ 2>/dev/null || true
          cp build/program_info/org.pollymc.PollyMC.desktop appdir/usr/share/applications/org.pollymc.PollyMC.desktop
          cp program_info/org.pollymc.PollyMC_256.png appdir/usr/share/icons/hicolor/256x256/apps/org.pollymc.PollyMC.png
          # Copy OpenSSL shared libraries needed by Qt's TLS backend (resolve symlinks)
          cp -L /usr/lib/x86_64-linux-gnu/libssl.so.* appdir/usr/lib/ 2>/dev/null || true
          cp -L /usr/lib/x86_64-linux-gnu/libcrypto.so.* appdir/usr/lib/ 2>/dev/null || true

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          cp program_info/org.pollymc.PollyMC_256.png appdir/pollymc.png
          cp build/program_info/org.pollymc.PollyMC.desktop appdir/pollymc.desktop

          # Resolve exact filenames for OpenSSL libraries
          SSL_LIBS=$(ls /usr/lib/x86_64-linux-gnu/libssl.so.* 2>/dev/null | head -1)
          CRYPTO_LIBS=$(ls /usr/lib/x86_64-linux-gnu/libcrypto.so.* 2>/dev/null | head -1)

          LINUXDEPLOY_LIBRARY_ARGS=""
          [ -n "$SSL_LIBS" ] && LINUXDEPLOY_LIBRARY_ARGS="$LINUXDEPLOY_LIBRARY_ARGS --library $SSL_LIBS"
          [ -n "$CRYPTO_LIBS" ] && LINUXDEPLOY_LIBRARY_ARGS="$LINUXDEPLOY_LIBRARY_ARGS --library $CRYPTO_LIBS"

          ./linuxdeploy-x86_64.AppImage \
            --appdir appdir \
            $LINUXDEPLOY_LIBRARY_ARGS \
            --plugin qt \
            --output appimage

      - name: Rename AppImage
        run: |
          FILE=$(ls PollyMC*.AppImage 2>/dev/null | head -n1)
          if [ -z "$FILE" ]; then
            echo "ERROR: No AppImage found. Listing directory:"; ls -la; exit 1
          fi
          mv "$FILE" PollyMC-Continued-Linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Linux-AppImage
          path: PollyMC-Continued-Linux-x86_64.AppImage

      - name: Upload to release (Linux AppImage)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PollyMC-Continued-Linux-x86_64.AppImage
          generate_release_notes: false
          append_file: true
