name: Build PollyMC-Continued

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja

jobs:
  build-windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-qt6-networkauth
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-extra-cmake-modules
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-cmark
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-nghttp2
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-libb2
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-nsis

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Deploy Qt
        run: |
          cd build
          # windeployqt6 bundles all Qt plugins and DLLs needed at runtime
          /mingw64/bin/windeployqt6.exe --release pollymc.exe

          # Copy any remaining MinGW runtime DLLs that ldd finds but windeployqt6 missed
          for dll in $(ldd pollymc.exe | grep "/mingw64/bin/" | awk '{print $3}'); do
            cp -n "$dll" . 2>/dev/null || true
          done

          # Do the same for Qt plugin DLLs so they pull in their own deps
          for f in platforms/*.dll tls/*.dll imageformats/*.dll; do
            [ -f "$f" ] || continue
            for dll in $(ldd "$f" 2>/dev/null | grep "/mingw64/bin/" | awk '{print $3}'); do
              cp -n "$dll" . 2>/dev/null || true
            done
          done

      - name: Get version
        id: version
        # On a tag push this will be e.g. "v9.0.1"; on a branch it falls back to the short SHA
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build NSIS installer
        run: |
          # Convert the MSYS2 path to a Windows path that makensis understands
          BUILD_DIR_WIN="$(cygpath -w "$(pwd)/build")"
          VERSION="${{ steps.version.outputs.version }}"

          # Patch the version string in the NSI file and run makensis
          sed "s/PollyMC-Continued-9\.0\.0-Setup/PollyMC-Continued-${VERSION}-Setup/" \
            pollymc_installer.nsi > /tmp/pollymc_installer_versioned.nsi

          makensis \
            "/DBUILD_DIR=${BUILD_DIR_WIN}" \
            /tmp/pollymc_installer_versioned.nsi

      - name: Zip portable build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd build
          7z a "../PollyMC-Continued-${VERSION}-Windows-portable.zip" .

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Windows-portable
          path: PollyMC-Continued-*-Windows-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Windows-installer
          path: PollyMC-Continued-*-Setup.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-svg-dev qt6-5compat-dev qt6-networkauth-dev \
            qt6-websockets-dev \
            qt6-base-dev-tools libgl-dev \
            extra-cmake-modules \
            libtomlplusplus-dev libcmark-dev libqrencode-dev \
            cmark \
            libquazip1-qt6-dev libarchive-dev zlib1g-dev \
            libcurl4-openssl-dev libssl-dev libpng-dev \
            liblz4-dev liblzma-dev libbz2-dev libzstd-dev \
            gamemode-dev \
            openjdk-21-jdk

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          cmake --install build --prefix /tmp/pollymc
          mkdir -p appdir/usr/bin appdir/usr/share/{applications,icons/hicolor/256x256/apps}
          cp /tmp/pollymc/bin/pollymc appdir/usr/bin/
          cp /tmp/pollymc/bin/pollymc_filelink appdir/usr/bin/ 2>/dev/null || true
          cp -r /tmp/pollymc/share/* appdir/usr/share/ 2>/dev/null || true
          cp build/program_info/org.pollymc.PollyMC.desktop appdir/usr/share/applications/org.pollymc.PollyMC.desktop
          cp program_info/org.pollymc.PollyMC_256.png appdir/usr/share/icons/hicolor/256x256/apps/org.pollymc.PollyMC.png

      - name: Create AppImage
        env:
          # Required: GitHub Actions runners don't have FUSE, so AppImages must
          # self-extract instead of mounting. Without this flag linuxdeploy hangs.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          # Icon and desktop file must be at the root of appdir for linuxdeploy
          cp program_info/org.pollymc.PollyMC_256.png appdir/pollymc.png
          cp build/program_info/org.pollymc.PollyMC.desktop appdir/pollymc.desktop

          # --plugin qt bundles all Qt libraries and plugins into the AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir appdir \
            --plugin qt \
            --output appimage

      - name: Rename AppImage
        run: |
          # linuxdeploy names the file from the desktop Name= field; normalise it
          # to a predictable filename for the release step.
          mv PollyMC*.AppImage PollyMC-Continued-Linux-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Linux-AppImage
          path: PollyMC-Continued-Linux-x86_64.AppImage

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Download all artifacts into a single flat directory so the glob in
      # softprops/action-gh-release can find them without recursive patterns.
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/PollyMC-Continued-*-Setup.exe
            release-assets/PollyMC-Continued-*-Windows-portable.zip
            release-assets/PollyMC-Continued-Linux-x86_64.AppImage
          generate_release_notes: true
