name: Build PollyMC-Continued

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_TYPE: Release
  CMAKE_GENERATOR: Ninja

jobs:
  build-windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-qt6-networkauth
            mingw-w64-x86_64-extra-cmake-modules
            mingw-w64-x86_64-tomlplusplus
            mingw-w64-x86_64-cmark
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-nghttp2
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-libb2
            mingw-w64-x86_64-libidn2
            mingw-w64-x86_64-sqlite3

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Deploy
        run: |
          cd build
          windeployqt6 pollymc.exe
          for dll in $(ldd pollymc.exe | grep "/mingw64/bin/" | awk '{print $1}'); do
            cp /mingw64/bin/$dll . 2>/dev/null || true
          done
          for f in platforms/*.dll tls/*.dll; do
            for dll in $(ldd "$f" 2>/dev/null | grep "/mingw64/bin/" | awk '{print $1}'); do
              cp /mingw64/bin/$dll . 2>/dev/null || true
            done
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Windows
          path: build/

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-svg-dev qt6-5compat-dev qt6-networkauth-dev \
            qt6-base-dev-tools libgl-dev \
            extra-cmake-modules \
            libtomlplusplus-dev libcmark-dev libqrencode-dev \
            cmark \
            libquazip1-qt6-dev libarchive-dev zlib1g-dev \
            libcurl4-openssl-dev libssl-dev libpng-dev \
            liblz4-dev liblzma-dev libbz2-dev libzstd-dev \
            gamemode-dev \
            openjdk-21-jdk

      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            -DCMAKE_C_FLAGS="-Wno-error" \
            -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          cmake --install build --prefix /tmp/pollymc
          mkdir -p appdir/usr/share/{applications,icons/hicolor/256x256/apps}
          cp -r /tmp/pollymc/* appdir/
          cp program_info/org.pollymc.PollyMC.desktop.in appdir/usr/share/applications/org.pollymc.PollyMC.desktop
          cp program_info/org.pollymc.PollyMC_256.png appdir/usr/share/icons/hicolor/256x256/apps/org.pollymc.PollyMC.png

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir appdir --output appimage --desktop-file appdir/usr/share/applications/org.pollymc.PollyMC.desktop --icon-file appdir/usr/share/icons/hicolor/256x256/apps/org.pollymc.PollyMC.png

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: PollyMC-Continued-Linux-AppImage
          path: PollyMC_Continued*.AppImage

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PollyMC-Continued-Windows/**
          generate_release_notes: true
